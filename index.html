<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSRFotos | Ensaios e Fotografia de Estúdio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header" id="topo">
    <nav class="navbar">
      <a class="brand" href="#topo"><span id="brandHighlight">CSR</span><span id="brandRest">Fotos</span></a>
      <button class="menu-toggle" aria-label="Abrir menu">☰</button>
      <div class="nav-links">
        <a id="navAbout" href="#sobre"></a><a id="navPortfolio" href="#portfolio"></a><a id="navPackages" href="#pacotes"></a><a id="navTestimonials" href="#avaliacoes"></a><a id="navContact" href="#contato"></a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero section-reveal">
      <div class="hero-content">
        <p class="eyebrow" id="heroEyebrow"></p><h1 id="heroTitle"></h1><p class="hero-text" id="heroText"></p>
        <div class="hero-actions"><a class="btn primary" id="heroPrimaryButton" href="#pacotes"></a><a class="btn secondary" id="heroSecondaryButton" href="#portfolio"></a></div>
      </div>
      <div class="hero-card" aria-label="Imagem destaque">
        <img id="heroImage" src="" alt="" />
        <div class="floating-badge"><span id="heroBadgeLine1"></span><br><strong id="heroBadgeLine2"></strong></div>
      </div>
    </section>

    <section id="sobre" class="about section-reveal"><div><p class="eyebrow" id="aboutEyebrow"></p><h2 id="aboutTitle"></h2></div><p id="aboutText"></p></section>
    <section id="portfolio" class="portfolio section-reveal"><div class="section-heading"><p class="eyebrow" id="portfolioEyebrow"></p><h2 id="portfolioTitle"></h2><p id="portfolioText"></p></div><div class="filters" id="portfolioFilters"></div><div class="gallery" id="portfolioGrid"></div></section>
    <section id="pacotes" class="packages section-reveal"><div class="section-heading"><p class="eyebrow" id="packagesEyebrow"></p><h2 id="packagesTitle"></h2><p id="packagesText"></p></div><div class="package-grid" id="packageGrid"></div></section>
    <section id="avaliacoes" class="testimonials section-reveal"><div class="section-heading"><p class="eyebrow" id="testimonialsEyebrow"></p><h2 id="testimonialsTitle"></h2></div><div class="testimonial-grid" id="testimonialGrid"></div></section>
    <section id="contat" class="contact section-reveal"><div><p class="eyebrow" id="contactEyebrow"></p><h2 id="contactTitle"></h2><p id="contactText"></p></div><div class="contact-card" id="contactList"></div></section>
  </main>

  <div class="album-lightbox" id="albumLightbox" aria-hidden="true" role="dialog" aria-modal="true">
    <div class="album-toolbar"><div><strong id="albumTitle"></strong><span id="albumMeta"></span></div><button class="album-close" id="albumClose">×</button></div>
    <div class="album-stage"><button class="album-nav previous" id="albumPrevious">‹</button><img id="albumImage" src="" alt="" /><button class="album-nav next" id="albumNext">›</button></div>
    <div class="album-thumbnails" id="albumThumbnails"></div>
  </div>

  <footer><p>© <span id="year"></span> <span id="footerText"></span></p><a id="adminLink" href="admin/index.html"></a></footer>
  <script src="data.js"></script><script src="script.js"></script>
</body>
</html>
